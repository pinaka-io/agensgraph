name: Build and Push Multiplatform Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version and tags
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag build: use tag version for both build and docker tag
            VERSION=${GITHUB_REF#refs/tags/}
            echo "agensgraph_version=${VERSION}" >> $GITHUB_OUTPUT
            echo "docker_tag=${VERSION}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            # Main branch build: use default version for build, tag as main
            echo "agensgraph_version=v2.16.0" >> $GITHUB_OUTPUT
            echo "docker_tag=main" >> $GITHUB_OUTPUT
            echo "docker_tag_sha=main-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          else
            # Fallback for manual dispatch
            echo "agensgraph_version=v2.16.0" >> $GITHUB_OUTPUT
            echo "docker_tag=v2.16.0" >> $GITHUB_OUTPUT
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.docker_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AGENSGRAPH_VERSION=${{ steps.version.outputs.agensgraph_version }}
          outputs: type=image,name=ghcr.io/${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version and tags
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag build: use tag version for both build and docker tag
            VERSION=${GITHUB_REF#refs/tags/}
            echo "agensgraph_version=${VERSION}" >> $GITHUB_OUTPUT
            echo "docker_tag=${VERSION}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            # Main branch build: use default version for build, tag as main
            echo "agensgraph_version=v2.16.0" >> $GITHUB_OUTPUT
            echo "docker_tag=main" >> $GITHUB_OUTPUT
            echo "docker_tag_sha=main-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          else
            # Fallback for manual dispatch
            echo "agensgraph_version=v2.16.0" >> $GITHUB_OUTPUT
            echo "docker_tag=v2.16.0" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # Build tag list
          TAGS="-t ghcr.io/${{ env.REGISTRY_IMAGE }}:${{ steps.version.outputs.docker_tag }}"
          if [[ -n "${{ steps.version.outputs.docker_tag_sha }}" ]]; then
            TAGS="$TAGS -t ghcr.io/${{ env.REGISTRY_IMAGE }}:${{ steps.version.outputs.docker_tag_sha }}"
          fi

          # Create manifest
          docker buildx imagetools create $TAGS \
            $(printf 'ghcr.io/${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ env.REGISTRY_IMAGE }}:${{ steps.version.outputs.docker_tag }}
